# Common logging configuration
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nexus-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - data
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexus-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 6000
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure
    networks:
      - data
      - backend
    logging: *default-logging

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexus-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 6 --replication-factor 1 --topic order_events
      echo 'Topic order_events created with 6 partitions for parallel processing.'
      "
    restart: on-failure
    networks:
      - data
      - backend

  producer:
    build:
      context: ..
      dockerfile: kafka_producer/Dockerfile
    container_name: nexus-producer
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      METRICS_PORT: "9090"
    # ports:
    #   - "9090:9090"
    restart: on-failure
    networks:
      - backend
      - data
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../data_warehouse/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ../data_warehouse/run_migrations.sh:/docker-entrypoint-initdb.d/00_run_migrations.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  partition-cron:
    image: postgres:16-alpine
    container_name: nexus-partition-cron
    depends_on:
      postgres:
        condition: service_healthy
    env_file: [../.env]
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "while true; do
        PGPASSWORD=$$PG_PASSWORD psql -h $$PG_HOST -U $$PG_USER -d $$PG_DB \
          -c 'SELECT create_next_month_partition();'
        sleep 86400
      done"
    restart: on-failure
    networks:
      - data
    logging: *default-logging

  spark-processor:
    build:
      context: ..
      dockerfile: spark_streaming/Dockerfile
    container_name: nexus-spark
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      CHECKPOINT_DIR: ${CHECKPOINT_DIR}
    volumes:
      - spark_checkpoints:/opt/spark-checkpoints
    restart: on-failure
    networks:
      - backend
      - data
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "2"
          memory: 2G

  anomaly-detector:
    build:
      context: ..
      dockerfile: ml_models/Dockerfile
    container_name: nexus-anomaly-detector
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      SCAN_INTERVAL: ${SCAN_INTERVAL}
      METRICS_PORT: "9091"
    # ports:
    #   - "9091:9091"
    restart: on-failure
    networks:
      - backend
      - data
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G

  ollama-init:
    image: ollama/ollama:latest
    container_name: nexus-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_MODEL}"]
    env_file:
      - ../.env
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: on-failure
    networks:
      - backend

  ai-copilot:
    build:
      context: ..
      dockerfile: ai_copilot/Dockerfile
    container_name: nexus-ai-copilot
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      COPILOT_INTERVAL: ${COPILOT_INTERVAL}
      METRICS_PORT: "9093"
    # ports:
    #   - "9093:9093"
    restart: on-failure
    networks:
      - backend
      - data
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  dashboard:
    build:
      context: ..
      dockerfile: dashboard/Dockerfile
    container_name: nexus-dashboard
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    environment:
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    restart: on-failure
    networks:
      - frontend
      - data
    logging: *default-logging

  api-service:
    build:
      context: ..
      dockerfile: api_service/Dockerfile
    container_name: nexus-api-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      CORS_ORIGINS: http://localhost:8501
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    networks:
      - frontend
      - data
    logging: *default-logging
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 128M
        limits:
          cpus: "1"
          memory: 512M

  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: nexus-prometheus
    ports:
      - "9099:9090"
    volumes:
      - ../infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: on-failure
    networks: [backend, data, frontend]
    logging: *default-logging

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: nexus-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-change_this_in_production}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on: [prometheus]
    restart: on-failure
    networks: [frontend, data]
    logging: *default-logging

networks:
  frontend:
  backend:
  data:

volumes:
  postgres_data:
  ollama_data:
  spark_checkpoints:
  prometheus_data:
  grafana_data:
