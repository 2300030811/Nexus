# infrastructure/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nexus-producer
    static_configs:
      - targets: ["producer:9090"]

  - job_name: nexus-anomaly-detector
    static_configs:
      - targets: ["anomaly-detector:9091"]

  - job_name: nexus-ai-copilot
    static_configs:
      - targets: ["ai-copilot:9093"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
